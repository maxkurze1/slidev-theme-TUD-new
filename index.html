<!--
  Favicon assets live in this theme's public/ folder, which Slidev copies to
  the "/theme/" path in any consuming presentation, so all hrefs use that prefix.
-->
<head>
  <!-- Light color scheme -->
  <link rel="apple-touch-icon" sizes="180x180" href="/theme/apple-touch-icon.png" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/png" sizes="32x32" href="/theme/favicon-32x32.png" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/png" sizes="16x16" href="/theme/favicon-16x16.png" media="(prefers-color-scheme: light)">
  <link rel="icon" href="/theme/favicon.ico" sizes="any" media="(prefers-color-scheme: light)">

  <!-- Dark color scheme -->
  <link rel="apple-touch-icon" sizes="180x180" href="/theme/dark/apple-touch-icon.png" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/png" sizes="32x32" href="/theme/dark/favicon-32x32.png" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/png" sizes="16x16" href="/theme/dark/favicon-16x16.png" media="(prefers-color-scheme: dark)">
  <link rel="icon" href="/theme/dark/favicon.ico" sizes="any" media="(prefers-color-scheme: dark)">

  <!-- PWA manifest -->
  <link rel="manifest" href="/theme/site.webmanifest">
</head>
